[jobs.run]
command = ["cargo", "run"]
need_stdout = true
watch = ["src", "Cargo.toml", "Cargo.lock"]
allow_warnings = true
background = false
on_change_strategy = "kill_then_restart"
scroll_anchor = "auto"

[jobs.check]
command = ["cargo", "check", "--all-targets"]
need_stdout = true
watch = ["src", "Cargo.toml", "Cargo.lock"]
allow_warnings = true
background = false
on_change_strategy = "kill_then_restart"
scroll_anchor = "auto"

[jobs.clippy]
command = ["cargo", "clippy", "--all-targets"]
need_stdout = true
watch = ["src", "Cargo.toml", "Cargo.lock", "clippy.toml"]
allow_warnings = true
background = false
on_change_strategy = "kill_then_restart"
scroll_anchor = "auto"

[jobs.test]
command = ["cargo", "test"]
need_stdout = true
watch = ["src", "Cargo.toml", "Cargo.lock"]
allow_warnings = true
background = false
on_change_strategy = "kill_then_restart"
scroll_anchor = "auto"
